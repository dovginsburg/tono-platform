name: Tono
options:
  bundleIdPrefix: com.tono
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "26.5"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Tono:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
        excludes:
          - "**/*Tests.swift"
    info:
      path: App/Info.plist
    entitlements:
      path: App/Tono.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tono.app
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMPILER_INDEX_STORE_ENABLE: NO
    dependencies:
      - target: TonoKeyboard
        embed: true

  TonoKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardExtension
      - path: Shared
        excludes:
          - "**/*Tests.swift"
    info:
      path: KeyboardExtension/Info.plist
    entitlements:
      path: KeyboardExtension/TonoKeyboard.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tono.app.keyboard
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
        COMPILER_INDEX_STORE_ENABLE: NO
